<!-- forum/templates/profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
</head>
<body>
    <h2>{{ user.username }}'s Profile</h2>
    {% if user.profile.profile_picture %}
        <img src="{{ user.profile.profile_picture.url }}" alt="Profile Picture" style="width:150px;height:auto;">
    {% endif %}
    <p><strong>Bio:</strong> {{ user.profile.bio }}</p>
    <a href="{% url 'edit_profile' %}">Edit Profile</a>  <!-- Link to edit profile if implemented -->
    <a href="{% url 'logout' %}">Logout</a>
</body>
</html>
